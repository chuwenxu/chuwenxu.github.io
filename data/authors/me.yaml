bio: |
  Chuwen Xu is an undergraduate student in the School of Mathematics and Statistics at Wuhan University. 
  Her research focuses on bioinformatics, particularly transcriptomics and computational biology. 
  She is interested in developing novel computational methods and deep learning approaches for large-scale omics data analysis,
  aiming to advance biological discovery through data-driven research.

