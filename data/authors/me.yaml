    start: 2026-05-15
    summary: |
      Contributed to the mathematical formulation and algorithm design of a multi-platform transcript quantification framework.
      Spearheaded large-scale bioinformatic data analysis, experimental validation, and statistical evaluation.
      Utilized linear algebra and statistical frameworks to systematically investigate transcript and gene identifiability, directly assessing its impact on quantification accuracy.

  - role: Research Assistant
    org: Dr. Dingjie Wang's Lab, Institute for Math & AI, Wuhan
    start: 2026-01-18
    summary: |
      Served as the project lead and coordinator for a comprehensive review on long-read transcriptomics.
      Coordinated a team of four co-first authors to streamline overarching scientific logic and maintain project timelines.
      Drafted ~7,000 words of the manuscript and designed 5 core conceptual figures.
      Evaluated bioinformatic tools by diving into their underlying mathematical principles and algorithmic taxonomy,
      bridging theoretical foundations with practical application-driven performance differences.
