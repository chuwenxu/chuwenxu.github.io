# Navigation Links
#   To link a homepage widget, specify the URL as a hash `#` followed by the filename of the
  #     desired widget in your `content/home/` folder.
  #   The weight parameter defines the order that the links will appear in.

main:
  - name: Bio
    url: /
    weight: 10
  - name: Publications
    url: /#publications
    weight: 30
  - name: Honors
    url: /#honors
    weight: 50
  - name: Miscellaneous
    url: /#miscellaneous
    weight: 60
  - name: Experience
    url: /#experience
    weight: 70
